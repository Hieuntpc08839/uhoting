<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gundam Gallery</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #0f172a;
    font-family: 'Segoe UI', sans-serif;
}

/* GRID */
.gallery {
    padding: 40px;
}

.card-img {
    border-radius: 15px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
}

.card-img img {
    width: 100%;
    height: 250px;
    object-fit: cover;
    transition: 0.4s;
}

.card-img:hover img {
    transform: scale(1.1);
}

/* overlay */
.overlay {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 10px;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
    color: white;
    opacity: 0;
    transition: 0.3s;
}

.card-img:hover .overlay {
    opacity: 1;
}
</style>
</head>

<body>

<div class="container gallery">
    <h2 class="text-white mb-4">Gundam Gallery</h2>

    <div class="row g-4">

        <!-- IMAGE 1 -->
        <div class="col-md-3">
            <div class="card-img">
                <img src="/public/z7126146897555_36695ada94b7bf725428e8ca07f459b8.jpg">
                <div class="overlay">RX-78-2</div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
