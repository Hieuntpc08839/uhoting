<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gundam Store</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #eef1f5;
}

/* HEADER */
.navbar {
    background: linear-gradient(90deg, #0d6efd, #6610f2);
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}
.navbar-brand {
    font-weight: bold;
    font-size: 22px;
}

/* HERO */
.hero {
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url('https://images.unsplash.com/photo-1606813907291-d86efa9b94db');
    background-size: cover;
    height: 520px;
    display: flex;
    align-items: center;
    color: white;
}
.hero h1 {
    font-size: 55px;
    font-weight: bold;
}

/* CATEGORY */
.category {
    background: white;
    padding: 25px;
    border-radius: 15px;
    transition: 0.3s;
    font-weight: 600;
    box-shadow: 0 5px 10px rgba(0,0,0,0.05);
}
.category:hover {
    background: #0d6efd;
    color: white;
    transform: translateY(-5px);
}

/* PRODUCT */
.product-card {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}
.product-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 12px 30px rgba(0,0,0,0.2);
}
.product-card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
}
.product-body {
    padding: 15px;
}
.price {
    color: #dc3545;
    font-weight: bold;
    font-size: 18px;
}
.badge-sale {
    position: absolute;
    top: 10px;
    left: 10px;
    background: red;
    color: white;
    padding: 5px 10px;
    font-size: 12px;
    border-radius: 5px;
}

/* BANNER */
.banner {
    height: 320px;
    border-radius: 15px;
    overflow: hidden;
    position: relative;
}
.banner img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.banner::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, rgba(0,0,0,0.7), transparent);
}
.banner-content {
    position: relative;
    z-index: 2;
}

/* FOOTER */
footer {
    background: #111;
    color: #aaa;
    padding: 25px;
}
</style>
</head>
